<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Fix 1: viewport meta -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar Power Prediction</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Solar Power Prediction</h1>

    <div class="mode-select" role="radiogroup" aria-label="Prediction mode">
      <label for="mode-day">
        <input type="radio" id="mode-day" name="mode" value="day" checked />
        Predict for a Day
      </label>
      <label for="mode-month">
        <input type="radio" id="mode-month" name="mode" value="month" />
        Predict for a Month
      </label>
    </div>

    <div id="day-inputs">
      <!-- Fix 2: proper label tied to input via 'for' + 'id' -->
      <label for="day-date">Select Date:</label>
      <input type="date" id="day-date" name="day-date" />
    </div>

    <div id="month-inputs">
      <!-- Fix 2: labels for each form element -->
      <label for="month-year">Year:</label>
      <input type="number" id="month-year" name="month-year" value="2025" />

      <label for="month-month">Month:</label>
      <input
        type="number"
        id="month-month"
        name="month-month"
        value="3"
        min="1"
        max="12"
      />
    </div>

    <button id="predict-btn" type="button">Predict</button>

    <h2>Result</h2>
    <pre id="result"></pre>
  </div>

  <script src="script.js"></script>
</body>
</html>
